spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.security.servlet.ManagementWebSecurityAutoConfiguration
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:traveloptimizer;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect
  cache:
    type: none
ml:
  enabled: false
amadeus:
  enabled: false
  # Read API credentials from environment variables in dev. Do NOT commit secrets.
  api-key: ${AMADEUS_API_KEY:}
  api-secret: ${AMADEUS_API_SECRET:}

# Default to mock provider in local dev; set TRAVEL_PROVIDERS_FLIGHTS=amadeus to use the real API
travel:
  providers:
    flights: ${TRAVEL_PROVIDERS_FLIGHTS:mock}
