[build]
builder = "NIXPACKS"
buildCommand = "chmod +x ./mvnw && ./mvnw -DskipTests package"

[deploy]
startCommand = "java -Dserver.port=$PORT -jar target/traveloptimizer-0.0.1-SNAPSHOT.jar"
healthcheckPath = "/actuator/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
